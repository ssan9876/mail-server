# Internal nginx that serves the built SPA. The public edge proxy (docker/nginx)
# forwards to this on port 3000. SPA history-fallback to index.html.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
