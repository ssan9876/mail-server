# ============================================================================
# DKIM signing. Keys + selector map are exported from the database to the
# shared /dkim volume by the backend (dkim_export_service).
#   /dkim/<domain>/<selector>.key   private key (PKCS8 PEM)
#   /dkim/selectors.map             "<domain> <selector>" per line
# If a domain has no key yet, signing is simply skipped for it.
# ============================================================================
enabled = true;

# Sign mail from authenticated submission and from our own networks.
sign_authenticated = true;
sign_local = true;

# Derive the signing domain from the From: header (effective second-level).
use_domain = "header";
use_esld = true;

allow_hdrfrom_mismatch = true;
allow_username_mismatch = true;

# Per-domain key lookup.
path = "/dkim/$domain/$selector.key";
selector_map = "/dkim/selectors.map";
# Fallback selector if a domain is missing from the map.
selector = "mail";
