# ============================================================================
# Per-user quota. The limit comes from each user's `quota_rule` (set by the
# SQL user_query from mailboxes.quota_mb); this just selects the backend and
# exposes quota over IMAP.
# ============================================================================

plugin {
  quota = maildir:User quota
  quota_grace = 10%%
  # Warn the user as they approach the limit (optional hooks could go here).
  quota_status_success = DUNNO
  quota_status_nouser = DUNNO
  quota_status_overquota = "552 5.2.2 Mailbox is full"
}

protocol imap {
  mail_plugins = $mail_plugins imap_quota
}
