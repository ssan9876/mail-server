# ============================================================================
# TLS. Certificate/key paths are injected at startup via 99-runtime.conf
# (Let's Encrypt if present, otherwise a self-signed fallback).
# ============================================================================

ssl = required
ssl_min_protocol = TLSv1.2
ssl_prefer_server_ciphers = yes
ssl_cipher_list = ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:!aNULL:!MD5:!DSS
