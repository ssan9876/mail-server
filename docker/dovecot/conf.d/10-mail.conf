# ============================================================================
# Mail storage — Maildir++ on the shared volume, single vmail uid/gid.
# Layout: /maildata/<domain>/<local_part>/  (matches mailboxes.maildir_path)
# ============================================================================

mail_location = maildir:/maildata/%d/%n

# All mail is owned by the single virtual-mail user.
mail_uid = vmail
mail_gid = vmail
mail_privileged_group = vmail
first_valid_uid = 5000
last_valid_uid = 5000

mail_plugins = quota

namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
}
