# ============================================================================
# Service definitions and listeners.
# ============================================================================

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

# LMTP over TCP — Postfix delivers accepted mail here (main.cf:
# virtual_transport = lmtp:inet:dovecot:24).
service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# Auth service. The inet listener on :12345 is what Postfix's Dovecot SASL
# connects to (main.cf: smtpd_sasl_path = inet:dovecot:12345). Only reachable
# on the internal/mail Docker networks — never published to the host.
service auth {
  inet_listener {
    port = 12345
  }
  unix_listener auth-userdb {
    mode = 0660
    user = vmail
    group = vmail
  }
}

service auth-worker {
  user = vmail
}
