# ============================================================================
# Dovecot main configuration.
# Host-specific bits (hostname, TLS cert paths, SQL credentials) are generated
# at container start — see entrypoint.sh and conf.d/99-runtime.conf.
# ============================================================================

protocols = imap pop3 lmtp
listen = *
base_dir = /run/dovecot
login_greeting = mail-server ready.

# Log to stdout/stderr for `docker compose logs`.
log_path = /dev/stderr
info_log_path = /dev/stdout

!include conf.d/*.conf
!include_try local.conf
