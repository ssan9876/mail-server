# ============================================================================
# Public edge nginx — top-level config.
# Per-host server blocks are rendered from templates into conf.d at startup.
# ============================================================================
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 50m;          # match Postfix message_size_limit

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # --- Rate-limit zones (applied per-location in the HTTPS server block) ---
    # General API traffic, and a much tighter bucket for auth/reset endpoints.
    limit_req_zone $binary_remote_addr zone=api:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Rendered server blocks.
    include /etc/nginx/conf.d/*.conf;
}
